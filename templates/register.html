<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register - VitalMine CDSS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
              <h4>VitalMine System Registration</h4>
            </div>
            <div class="card-body">
              {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %} {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %} {% endif %} {% endwith %}

              <form method="POST" action="/register">
                <div class="mb-3">
                  <label>Username</label>
                  <input
                    type="text"
                    name="username"
                    class="form-control"
                    value="TestUser1"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label>Email</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="testuser1@hospital.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label>Password</label>
                  <input
                    type="password"
                    name="password"
                    id="passwordField"
                    class="form-control"
                    value="password123"
                    required
                  />
                  <input
                    type="checkbox"
                    onclick="togglePassword()"
                    class="mt-2"
                  />
                  Show Password
                </div>

                <div class="mb-3">
                  <label>Register As:</label>
                  <select
                    name="role"
                    id="roleSelect"
                    class="form-select"
                    onchange="toggleFormFields()"
                  >
                    <option value="patient" selected>Patient</option>
                    <option value="nurse">Nurse</option>
                    <option value="doctor">Doctor</option>
                  </select>
                </div>

                <div id="patientFields">
                  <h5 class="mt-4 border-bottom pb-2">Patient Demographics</h5>
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label>Age</label>
                      <input
                        type="number"
                        name="age"
                        class="form-control"
                        value="45"
                      />
                    </div>
                    <div class="col-md-6 mb-3">
                      <label>Gender</label>
                      <select name="gender" class="form-select">
                        <option value="Male" selected>Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                      </select>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label>Blood Group</label>
                      <input
                        type="text"
                        name="blood_group"
                        class="form-control"
                        value="O+"
                      />
                    </div>
                    <div class="col-md-6 mb-3">
                      <label>Contact Number</label>
                      <input
                        type="text"
                        name="contact"
                        class="form-control"
                        value="9876543210"
                      />
                    </div>
                  </div>
                </div>

                <div id="staffFields" style="display: none">
                  <h5 class="mt-4 border-bottom pb-2">Staff Credentials</h5>
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label>Employee ID</label>
                      <input
                        type="text"
                        name="emp_id"
                        class="form-control"
                        value="EMP-999"
                      />
                    </div>
                    <div class="col-md-6 mb-3">
                      <label>Department</label>
                      <input
                        type="text"
                        name="department"
                        class="form-control"
                        value="Emergency (ER)"
                      />
                    </div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                  Register User
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="/login">Already have an account? Login here.</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Phase 20: Password Visibility Toggle
      function togglePassword() {
        var x = document.getElementById("passwordField");
        if (x.type === "password") {
          x.type = "text";
        } else {
          x.type = "password";
        }
      }

      // Phase 23: Dynamic Form Switching
      function toggleFormFields() {
        var role = document.getElementById("roleSelect").value;
        var patientFields = document.getElementById("patientFields");
        var staffFields = document.getElementById("staffFields");

        if (role === "patient") {
          patientFields.style.display = "block";
          staffFields.style.display = "none";
        } else {
          patientFields.style.display = "none";
          staffFields.style.display = "block";
        }
      }
    </script>
  </body>
</html>
